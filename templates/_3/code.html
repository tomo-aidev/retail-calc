<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0056b2",
              "background-light": "#f5f7f8",
              "background-dark": "#0f1923",
            },
            fontFamily: {
              "display": ["Inter", "Noto Sans JP", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center overflow-hidden">
<div class="relative w-full max-w-md h-screen flex flex-col items-center justify-between p-8">
<!-- Decoration Elements -->
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Center Content -->
<div class="flex-1 flex flex-col items-center justify-center">
<!-- App Icon -->
<div class="relative mb-8">
<div class="w-32 h-32 bg-primary rounded-xl flex items-center justify-center shadow-2xl shadow-primary/30">
<span class="material-symbols-outlined text-white text-7xl" data-icon="calculate">calculate</span>
</div>
<!-- Subtle reflection/glow -->
<div class="absolute -bottom-4 w-24 h-4 bg-primary/20 blur-lg rounded-full mx-auto left-0 right-0"></div>
</div>
<!-- App Title -->
<div class="text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold tracking-tight mb-2">
                    小売計算Pro
                </h1>
<p class="text-primary font-medium tracking-widest uppercase text-sm mb-6">
                    Retail Calc Pro
                </p>
</div>
<!-- Tagline -->
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center max-w-[240px]">
                スマートな買い物、<br/>瞬時に計算
            </p>
</div>
<!-- Bottom Loading/Status Area -->
<div class="w-full max-w-xs space-y-6 pb-12">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center px-1">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">起動中...</p>
<p class="text-primary text-sm font-bold">75%</p>
</div>
<div class="h-1.5 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-1000" style="width: 75%;"></div>
</div>
</div>
<!-- Mini Footer Info -->
<div class="flex justify-center gap-4 text-slate-400 dark:text-slate-500">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="verified">verified</span>
<span class="text-xs">Secure</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="bolt">bolt</span>
<span class="text-xs">Fast</span>
</div>
</div>
</div>

</div>
</body></html>
